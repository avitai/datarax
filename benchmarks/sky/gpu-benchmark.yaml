name: datarax-benchmark-gpu

resources:
  accelerators: A100:1
  use_spot: true
  disk_size: 100

envs:
  WANDB_API_KEY:  # set via: sky launch ... --env WANDB_API_KEY=$WANDB_API_KEY
  JAX_PLATFORMS: "cuda,cpu"
  JAX_PLATFORM_NAME: "gpu"
  TF_FORCE_GPU_ALLOW_GROWTH: "true"
  TF_CPP_MIN_LOG_LEVEL: "2"
  XLA_PYTHON_CLIENT_PREALLOCATE: "false"
  XLA_PYTHON_CLIENT_MEM_FRACTION: "0.75"
  RAY_ENABLE_UV_RUN_RUNTIME_ENV: "0"

setup: |
  if ! command -v uv >/dev/null 2>&1; then
    if command -v curl >/dev/null 2>&1; then
      curl -LsSf https://astral.sh/uv/install.sh | sh
    elif command -v wget >/dev/null 2>&1; then
      wget -qO- https://astral.sh/uv/install.sh | sh
    else
      echo "ERROR: neither curl nor wget is available to install uv" >&2
      exit 1
    fi
  fi
  export PATH="$HOME/.local/bin:$PATH"
  cd ~/datarax && uv venv --python 3.11 .venv
  cd ~/datarax && uv sync --extra benchmark --extra gpu
  cd ~/datarax && uv pip install --python .venv/bin/python wandb

run: |
  set -euo pipefail
  cd ~/datarax

  # Clear RAY_ADDRESS so the benchmark doesn't connect to SkyPilot's Ray cluster.
  # SkyPilot's Ray (port 6379) stays running for --down/logs/status.
  unset RAY_ADDRESS

  # Run benchmark CLI as a module for deterministic availability.
  export PYTHONPATH="${PWD}:${PYTHONPATH:-}"

  # Quick sanity check (separate process)
  .venv/bin/python -c "import jax; print(f'JAX {jax.__version__}, backend: {jax.default_backend()}, devices: {jax.devices()}')"

  # Exclude Ray Data — hangs on SkyPilot VMs (Ray #59639).
  .venv/bin/python -m benchmarks.cli run \
    --platform gpu \
    --profile gpu_a100 \
    --repetitions 5 \
    --output-dir ~/results/ \
    --data ~/benchmark-data \
    --adapters Datarax \
    --adapters 'Google Grain' \
    --adapters jax-dataloader \
    --adapters tf.data \
    --adapters 'PyTorch DataLoader' \
    --adapters 'NVIDIA DALI' \
    --adapters SPDL \
    --adapters 'MosaicML Streaming' \
    --adapters WebDataset \
    --adapters 'HuggingFace Datasets' \
    --adapters LitData \
    --adapters 'Deep Lake'

file_mounts:
  ~/datarax: .
